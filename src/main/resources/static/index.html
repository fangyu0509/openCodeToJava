<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OpenCode</title>
<style>
  :root { --bg: #0d1117; --bg2: #161b22; --bg3: #1c2128; --border: #30363d; --text: #c9d1d9; --text2: #8b949e; --text3: #484f58; --accent: #58a6ff; --accent2: #238636; --accent2h: #2ea043; --danger: #da3633; --dangerh: #f85149; --codebg: #0d1117; --shadow: rgba(0,0,0,0.3); --dropzone: rgba(88,166,255,0.1); }
  .light { --bg: #ffffff; --bg2: #f6f8fa; --bg3: #eaeef2; --border: #d0d7de; --text: #1f2328; --text2: #656d76; --text3: #8c959f; --accent: #0969da; --accent2: #2da44e; --accent2h: #2c974b; --danger: #cf222e; --dangerh: #a40e26; --codebg: #f6f8fa; --shadow: rgba(0,0,0,0.1); --dropzone: rgba(9,105,218,0.08); }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; height: 100vh; display: flex; background: var(--bg); color: var(--text); transition: background 0.2s, color 0.2s; }
  .sidebar { width: 280px; background: var(--bg2); padding: 16px; display: flex; flex-direction: column; border-right: 1px solid var(--border); flex-shrink: 0; }
  .sidebar h1 { font-size: 18px; margin-bottom: 16px; color: var(--accent); letter-spacing: -0.5px; display: flex; align-items: center; gap: 8px; }
  .sidebar h1 .theme-btn { margin-left: auto; background: none; border: 1px solid var(--border); border-radius: 4px; padding: 2px 6px; cursor: pointer; font-size: 14px; color: var(--text2); line-height: 1; }
  .sidebar h1 .theme-btn:hover { color: var(--text); background: var(--bg); }
  .sidebar label { font-size: 11px; color: var(--text2); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
  .sidebar select, .sidebar input { width: 100%; padding: 8px 12px; margin-bottom: 10px; border: 1px solid var(--border); border-radius: 6px; background: var(--bg); color: var(--text); font-size: 13px; }
  .sidebar select:focus, .sidebar input:focus { outline: none; border-color: var(--accent); }
  .btn { padding: 8px 12px; margin-bottom: 8px; border: 1px solid var(--border); border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 600; text-align: center; transition: background 0.15s; }
  .btn-primary { background: var(--accent2); color: #fff; border: 1px solid var(--accent2); }
  .btn-primary:hover { background: var(--accent2h); }
  .btn-secondary { background: var(--bg2); color: var(--text); border: 1px solid var(--border); }
  .btn-secondary:hover { background: var(--bg3); }
  .btn-danger { background: var(--danger); color: #fff; border: 1px solid var(--danger); }
  .btn-danger:hover { background: var(--dangerh); }
  .btn-small { padding: 4px 8px; font-size: 11px; margin-bottom: 0; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .command-row { display: flex; gap: 4px; margin-bottom: 10px; flex-wrap: wrap; }
  .command-row .btn { flex: 1; min-width: 45px; margin-bottom: 0; }
  .sessions { flex: 1; overflow-y: auto; margin-top: 8px; }
  .sessions::-webkit-scrollbar { width: 4px; }
  .sessions::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  .session-item { padding: 8px 10px; border-radius: 6px; cursor: pointer; font-size: 12px; margin-bottom: 4px; transition: background 0.15s; display: flex; justify-content: space-between; align-items: center; }
  .session-item:hover { background: var(--bg3); }
  .session-item.active { background: var(--bg3); border-left: 3px solid var(--accent); }
  .session-item .s-name { font-weight: 600; margin-bottom: 2px; }
  .session-item .s-meta { font-size: 10px; color: var(--text2); }
  .session-item .s-del { color: var(--text2); cursor: pointer; font-size: 14px; padding: 2px 6px; border-radius: 3px; }
  .session-item .s-del:hover { color: var(--danger); background: var(--bg); }
  .main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
  .messages { flex: 1; overflow-y: auto; padding: 16px; }
  .messages::-webkit-scrollbar { width: 6px; }
  .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  .msg { margin-bottom: 16px; padding: 12px 16px; border-radius: 8px; max-width: 85%; line-height: 1.6; font-size: 14px; word-wrap: break-word; }
  .msg.user { background: var(--bg3); margin-left: auto; border: 1px solid var(--border); }
  .msg.assistant { background: var(--bg2); border: 1px solid var(--border); color: var(--text); }
  .msg.tool_call { background: color-mix(in srgb, var(--accent2) 10%, var(--bg)); font-family: 'SF Mono', 'Fira Code', monospace; font-size: 12px; max-width: 100%; border: 1px solid var(--accent2); }
  .msg.tool_result { background: color-mix(in srgb, #a371f7 10%, var(--bg)); font-family: 'SF Mono', 'Fira Code', monospace; font-size: 12px; max-width: 100%; border: 1px solid #a371f7; }
  .msg.error { background: color-mix(in srgb, var(--danger) 10%, var(--bg)); border-left: 3px solid var(--danger); border: 1px solid var(--danger); }
  .msg.plan { background: color-mix(in srgb, var(--accent2) 10%, var(--bg)); border: 1px solid var(--accent2); }
  .msg.file { background: var(--bg3); border: 1px dashed var(--accent); font-size: 12px; }
  .msg .meta { font-size: 10px; color: var(--text3); margin-top: 6px; }
  .msg p { margin: 0 0 8px; }
  .msg p:last-child { margin-bottom: 0; }
  .msg code { background: var(--codebg); padding: 1px 4px; border-radius: 3px; font-size: 12px; color: #f0c674; }
  .light .msg code { color: #0550ae; }
  .msg pre { background: var(--codebg); padding: 12px; border-radius: 6px; overflow-x: auto; margin: 8px 0; position: relative; }
  .msg pre code { background: none; padding: 0; color: var(--text); }
  .msg pre .copy-btn { position: absolute; top: 4px; right: 4px; padding: 2px 6px; font-size: 10px; background: var(--bg2); border: 1px solid var(--border); border-radius: 4px; color: var(--text2); cursor: pointer; }
  .msg pre .copy-btn:hover { background: var(--bg3); color: var(--text); }
  .msg ul, .msg ol { margin: 8px 0; padding-left: 24px; }
  .msg h1, .msg h2, .msg h3, .msg h4 { margin: 12px 0 6px; }
  .msg h1 { font-size: 18px; border-bottom: 1px solid var(--border); padding-bottom: 4px; }
  .msg h2 { font-size: 16px; } .msg h3 { font-size: 15px; }
  .msg strong { color: var(--text); }
  .msg blockquote { border-left: 3px solid var(--accent); padding-left: 12px; color: var(--text2); margin: 8px 0; }
  .msg table { border-collapse: collapse; margin: 8px 0; width: 100%; }
  .msg table th, .msg table td { border: 1px solid var(--border); padding: 6px 10px; text-align: left; }
  .msg table th { background: var(--bg3); }
  .msg a { color: var(--accent); }
  .msg hr { border: none; border-top: 1px solid var(--border); margin: 12px 0; }
  .input-area { padding: 12px 16px; border-top: 1px solid var(--border); }
  .file-area { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 8px; min-height: 0; }
  .file-area:empty { display: none; }
  .file-chip { display: inline-flex; align-items: center; gap: 4px; padding: 3px 8px; background: var(--bg2); border: 1px solid var(--border); border-radius: 4px; font-size: 11px; }
  .file-chip .fc-name { max-width: 120px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .file-chip .fc-rm { cursor: pointer; color: var(--text3); padding: 0 2px; }
  .file-chip .fc-rm:hover { color: var(--danger); }
  .input-row { display: flex; gap: 8px; align-items: flex-end; }
  .input-row textarea { flex: 1; padding: 10px 16px; border: 1px solid var(--border); border-radius: 8px; background: var(--bg); color: var(--text); font-size: 14px; font-family: inherit; resize: none; min-height: 42px; max-height: 200px; line-height: 1.5; }
  .input-row textarea:focus { outline: none; border-color: var(--accent); }
  .input-row .attach-btn { padding: 10px; background: var(--bg2); color: var(--text2); border: 1px solid var(--border); border-radius: 8px; cursor: pointer; font-size: 16px; line-height: 1; transition: background 0.15s; }
  .input-row .attach-btn:hover { background: var(--bg3); color: var(--text); }
  .input-row button.send-btn { padding: 10px 24px; background: var(--accent2); color: #fff; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; }
  .input-row button.send-btn:hover { background: var(--accent2h); }
  .input-row button.send-btn:disabled { background: var(--bg2); color: var(--text3); cursor: not-allowed; }
  .input-hint { font-size: 11px; color: var(--text3); margin-top: 4px; }
  .status-bar { padding: 6px 16px; font-size: 11px; color: var(--text2); text-align: center; border-top: 1px solid var(--border); display: flex; justify-content: space-between; }
  .thinking::after { content: '...'; animation: dots 1.5s steps(4, end) infinite; display: inline-block; }
  @keyframes dots { 0%, 20% { content: ''; } 40% { content: '.'; } 60% { content: '..'; } 80%, 100% { content: '...'; } }
  .autocomplete { position: absolute; bottom: 100%; left: 16px; right: 16px; background: var(--bg2); border: 1px solid var(--border); border-radius: 6px; max-height: 200px; overflow-y: auto; display: none; z-index: 100; box-shadow: 0 4px 12px var(--shadow); }
  .autocomplete div { padding: 8px 12px; cursor: pointer; font-size: 12px; }
  .autocomplete div:hover, .autocomplete div.selected { background: var(--bg3); }
  .autocomplete div .ac-path { color: var(--text2); font-size: 10px; }
  .drop-overlay { display: none; position: fixed; inset: 0; background: var(--dropzone); border: 3px dashed var(--accent); z-index: 999; align-items: center; justify-content: center; font-size: 18px; color: var(--accent); font-weight: 600; pointer-events: none; }
  .drop-overlay.active { display: flex; }
  @media (max-width: 640px) { .sidebar { width: 100%; height: auto; max-height: 200px; border-right: none; border-bottom: 1px solid var(--border); } body { flex-direction: column; } .msg { max-width: 100%; } }
</style>
</head>
<body>
<div class="drop-overlay" id="dropOverlay">Drop files to attach</div>
<div class="sidebar">
  <h1>OpenCode <span style="background:var(--bg);color:var(--text2);font-size:10px;padding:2px 6px;border-radius:4px;">Java</span>
    <button class="theme-btn" id="themeBtn" title="Toggle theme">&#9681;</button>
  </h1>
  <label>Agent</label>
  <select id="agentSelect"><option value="build">Build</option><option value="plan">Plan</option><option value="architect">Architect</option></select>
  <label>Model</label>
  <select id="modelSelect"></select>
  <div class="command-row">
    <button class="btn btn-secondary btn-small" id="undoBtn" title="/undo - Undo last change" disabled>&#8630;</button>
    <button class="btn btn-secondary btn-small" id="redoBtn" title="/redo - Redo last undo" disabled>&#8631;</button>
    <button class="btn btn-secondary btn-small" id="initBtn" title="/init - Initialize AGENTS.md">/init</button>
    <button class="btn btn-secondary btn-small" id="shareBtn" title="/share - Share session">&#128279;</button>
    <button class="btn btn-secondary btn-small" id="forkBtn" title="Fork session" disabled>&#128256;</button>
    <button class="btn btn-primary btn-small" id="newSessionBtn">+ New</button>
  </div>
  <div class="command-row">
    <button class="btn btn-secondary btn-small" id="settingsBtn" title="Settings">&#9881;</button>
    <button class="btn btn-secondary btn-small" id="refsBtn" title="View references">@refs</button>
  </div>
  <label>Sessions <span id="shareBadge" style="display:none;color:var(--accent);font-size:10px;"></span></label>
  <div class="sessions" id="sessionList"></div>
  <div class="info" id="sessionInfo" style="font-size:11px;color:var(--text3);margin-top:4px;word-break:break-all;">No session</div>
  <div id="settingsPanel" style="display:none;border-top:1px solid var(--border);margin-top:8px;padding-top:8px;">
    <label>Settings</label>
    <label style="font-size:12px;color:var(--text2);display:flex;align-items:center;gap:6px;margin-bottom:6px;">
      <input type="checkbox" id="autoScrollCb" checked> Auto-scroll
    </label>
    <label style="font-size:12px;color:var(--text2);display:flex;align-items:center;gap:6px;margin-bottom:6px;">
      <input type="checkbox" id="compactMsgsCb"> Compact messages
    </label>
    <button class="btn btn-secondary btn-small" id="clearSessionBtn" style="width:100%">Clear messages</button>
  </div>
  <div id="refsModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:1000;align-items:center;justify-content:center;">
    <div style="background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:16px;max-width:600px;max-height:80vh;overflow-y:auto;width:90%;">
      <h2 style="margin-bottom:12px;font-size:16px;">References</h2>
      <div id="refsContent" style="font-size:13px;line-height:1.5;white-space:pre-wrap;"></div>
      <button class="btn btn-primary" id="closeRefsBtn" style="margin-top:12px;">Close</button>
    </div>
  </div>
</div>
<div class="main">
  <div class="messages" id="messages"></div>
  <div class="status-bar">
    <span id="status">Ready</span>
    <span id="usageInfo"></span>
  </div>
  <div class="input-area" style="position:relative">
    <div class="autocomplete" id="autocomplete"></div>
    <div class="file-area" id="fileArea"></div>
    <div class="input-row">
      <button class="attach-btn" id="attachBtn" title="Attach file">&#128206;</button>
      <input type="file" id="fileInput" multiple style="display:none">
      <textarea id="input" placeholder="Type a message... (Enter to send, Shift+Enter for newline, @ to reference files)" rows="1" autofocus></textarea>
      <button class="send-btn" id="sendBtn" disabled>Send</button>
    </div>
    <div class="input-hint">Enter to send &middot; Shift+Enter newline &middot; @file to reference &middot; Drag files to attach</div>
  </div>
</div>
<script>
let sessionId = null;
let eventSource = null;
let currentAssistantDiv = null;
let currentAssistantText = '';
let isStreaming = false;
let fileSearchTimeout = null;
let selectedAcIndex = -1;
let attachedFiles = [];

const messagesEl = document.getElementById('messages');
const inputEl = document.getElementById('input');
const sendBtn = document.getElementById('sendBtn');
const statusEl = document.getElementById('status');
const usageEl = document.getElementById('usageInfo');
const newSessionBtn = document.getElementById('newSessionBtn');
const agentSelect = document.getElementById('agentSelect');
const modelSelect = document.getElementById('modelSelect');
const sessionListEl = document.getElementById('sessionList');
const sessionInfo = document.getElementById('sessionInfo');
const undoBtn = document.getElementById('undoBtn');
const redoBtn = document.getElementById('redoBtn');
const initBtn = document.getElementById('initBtn');
const shareBtn = document.getElementById('shareBtn');
const autoComplete = document.getElementById('autocomplete');
const themeBtn = document.getElementById('themeBtn');
const fileInput = document.getElementById('fileInput');
const attachBtn = document.getElementById('attachBtn');
const fileArea = document.getElementById('fileArea');
const dropOverlay = document.getElementById('dropOverlay');
const forkBtn = document.getElementById('forkBtn');
const settingsBtn = document.getElementById('settingsBtn');
const refsBtn = document.getElementById('refsBtn');
const settingsPanel = document.getElementById('settingsPanel');
const refsModal = document.getElementById('refsModal');
const refsContent = document.getElementById('refsContent');
const closeRefsBtn = document.getElementById('closeRefsBtn');
const autoScrollCb = document.getElementById('autoScrollCb');
const compactMsgsCb = document.getElementById('compactMsgsCb');
const clearSessionBtn = document.getElementById('clearSessionBtn');

// Theme toggle
function getTheme() { return localStorage.getItem('opencode-theme') || 'dark'; }
function setTheme(t) {
  document.body.classList.toggle('light', t === 'light');
  localStorage.setItem('opencode-theme', t);
  themeBtn.textContent = t === 'light' ? '\u25D0' : '\u25C1';
}
setTheme(getTheme());
themeBtn.addEventListener('click', () => setTheme(getTheme() === 'light' ? 'dark' : 'light'));

// File drag-and-drop
function preventDefaults(e) { e.preventDefault(); e.stopPropagation(); }
document.addEventListener('dragenter', e => { preventDefaults(e); dropOverlay.classList.add('active'); });
document.addEventListener('dragover', preventDefaults);
document.addEventListener('dragleave', e => { if (e.target === document) dropOverlay.classList.remove('active'); });
document.addEventListener('drop', e => {
  preventDefaults(e);
  dropOverlay.classList.remove('active');
  if (e.dataTransfer.files.length) handleFiles(e.dataTransfer.files);
});

attachBtn.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', () => { if (fileInput.files.length) handleFiles(fileInput.files); });

async function handleFiles(files) {
  if (!sessionId) await ensureSession();
  for (const f of files) {
    if (attachedFiles.find(a => a.name === f.name)) continue;
    const chip = document.createElement('span');
    chip.className = 'file-chip';
    chip.innerHTML = '<span class="fc-name">' + f.name + '</span> <span class="fc-rm" data-name="' + f.name + '">&times;</span>';
    chip.querySelector('.fc-rm').addEventListener('click', () => removeFile(f.name));
    fileArea.appendChild(chip);
    attachedFiles.push({ name: f.name, file: f, chip });
    setStatus('Uploading ' + f.name + '...');
    await uploadFile(f);
  }
  setReady();
}

async function uploadFile(file) {
  const fd = new FormData();
  fd.append('file', file);
  try {
    const res = await fetch('/api/session/' + sessionId + '/files', { method: 'POST', body: fd });
    if (!res.ok) throw new Error(await res.text());
    const info = await res.json();
    const msgDiv = document.createElement('div');
    msgDiv.className = 'msg file';
    msgDiv.textContent = 'Attached: ' + info.name + ' (' + (info.size / 1024).toFixed(1) + ' KB)';
    const meta = document.createElement('div'); meta.className = 'meta';
    meta.textContent = new Date().toLocaleTimeString();
    msgDiv.appendChild(meta);
    messagesEl.appendChild(msgDiv);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  } catch(e) {
    const errDiv = document.createElement('div');
    errDiv.className = 'msg error';
    errDiv.textContent = 'Upload failed: ' + e.message;
    messagesEl.appendChild(errDiv);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }
}

function removeFile(name) {
  attachedFiles = attachedFiles.filter(a => a.name !== name);
  const chip = fileArea.querySelector('[data-name="' + name + '"]');
  if (chip) chip.closest('.file-chip').remove();
}

async function loadProviders() {
  const res = await fetch('/api/providers');
  const providers = await res.json();
  if (!providers.length) providers.push({name: 'ollama', defaultModel: 'default'});
  modelSelect.innerHTML = providers.map(p =>
    `<option value="${p.name}">${p.name} (${p.defaultModel})</option>`
  ).join('');
}

async function loadUsage() {
  try {
    const res = await fetch('/api/usage');
    if (!res.ok) return;
    const u = await res.json();
    const total = u.totalTokens || 0;
    const models = Object.keys(u.byModel || {}).join(', ');
    usageEl.textContent = total > 0 ? `Tokens: ${total.toLocaleString()} (${models})` : '';
  } catch(e) {}
}

async function loadSessions() {
  try {
    const res = await fetch('/api/sessions');
    const sessions = await res.json();
    sessionListEl.innerHTML = sessions.map(s => {
      const active = s.id === sessionId ? 'active' : '';
      const stitle = s.title ? s.title.slice(0, 40) : (s.agent || 'build');
      return `<div class="session-item ${active}" data-id="${s.id}">
        <div><div class="s-name">${stitle}</div>
        <div class="s-meta">${s.agent || 'build'} &middot; ${s.messageCount} msgs</div></div>
        <span class="s-del" data-id="${s.id}">&times;</span>
      </div>`;
    }).join('');
    sessionListEl.querySelectorAll('.session-item').forEach(el => {
      el.addEventListener('click', e => { if (!e.target.classList.contains('s-del')) switchSession(el.dataset.id); });
    });
    sessionListEl.querySelectorAll('.s-del').forEach(el => {
      el.addEventListener('click', e => { e.stopPropagation(); quickDelete(el.dataset.id); });
    });
  } catch(e) {}
}

async function quickDelete(id) {
  await fetch('/api/session/' + id, { method: 'DELETE' });
  if (id === sessionId) {
    sessionId = null;
    messagesEl.innerHTML = '';
    if (eventSource) { eventSource.close(); eventSource = null; }
    sessionInfo.textContent = 'No session';
    enableInput(false);
  }
  loadSessions();
}

async function switchSession(id) {
  if (id === sessionId) return;
  if (eventSource) { eventSource.close(); eventSource = null; }
  sessionId = id;
  finalizeAssistant();
  setStatus('Loading session...');
  try {
    const res = await fetch('/api/session/' + id + '/messages');
    const msgs = await res.json();
    messagesEl.innerHTML = '';
    for (const m of msgs) {
      const div = document.createElement('div');
      if (m.type === 'tool_call' || m.type === 'tool_result') {
        div.className = 'msg ' + m.type;
        div.textContent = (m.type === 'tool_call' ? 'Tool Call: ' : 'Result: ') + m.text;
      } else if (m.type === 'file') {
        div.className = 'msg file';
        div.textContent = 'Attached: ' + m.text;
      } else if (m.type === 'plan') {
        div.className = 'msg plan';
        div.innerHTML = renderMarkdown(m.text || '');
      } else {
        div.className = 'msg ' + m.role;
        div.innerHTML = renderMarkdown(m.text || '');
      }
      const meta = document.createElement('div');
      meta.className = 'meta';
      meta.textContent = new Date(m.timestamp).toLocaleTimeString();
      div.appendChild(meta);
      messagesEl.appendChild(div);
    }
    messagesEl.scrollTop = messagesEl.scrollHeight;
    connectStream(id);
    sessionInfo.textContent = 'Session: ' + id.slice(0, 8) + '... | ' + msgs.length + ' msgs';
    setReady();
    enableInput(true);
    updateUI();
    loadSessions();
  } catch(e) {
    setStatus('Failed to load session');
  }
}

function connectStream(id) {
  if (eventSource) eventSource.close();
  eventSource = new EventSource('/api/session/' + id + '/stream');
  eventSource.addEventListener('token', e => onToken(e.data));
  eventSource.addEventListener('done', e => onDone(e.data));
  eventSource.addEventListener('error', e => onError(e.data));
  eventSource.addEventListener('tool_call', e => onToolCall(e.data));
  eventSource.addEventListener('tool_result', e => addEvent('tool_result', e.data));
  eventSource.addEventListener('plan', e => addEvent('plan', e.data));
  eventSource.addEventListener('ask_permission', e => addEvent('ask_permission', e.data));
  eventSource.addEventListener('compaction', e => addEvent('compaction', e.data));
  eventSource.addEventListener('compaction_error', e => addEvent('compaction_error', e.data));
}

async function ensureSession() {
  if (sessionId) return;
  if (eventSource) { eventSource.close(); eventSource = null; }
  messagesEl.innerHTML = '';
  finalizeAssistant();
  setStatus('Creating session...');
  const agent = agentSelect.value;
  const model = modelSelect.value;
  const res = await fetch('/api/session', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({agent, model: model + ':default'})
  });
  const data = await res.json();
  sessionId = data.id;
  sessionInfo.textContent = 'Session: ' + sessionId.slice(0, 8) + '... | ' + data.agent;
  connectStream(sessionId);
  loadSessions();
  enableInput(true);
  setReady();
}

async function newSession() {
  if (eventSource) { eventSource.close(); eventSource = null; }
  messagesEl.innerHTML = '';
  finalizeAssistant();
  attachedFiles = [];
  fileArea.innerHTML = '';
  setStatus('Creating session...');

  const agent = agentSelect.value;
  const model = modelSelect.value;
  const res = await fetch('/api/session', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({agent, model: model + ':default'})
  });
  const data = await res.json();
  sessionId = data.id;
  sessionInfo.textContent = 'Session: ' + sessionId.slice(0, 8) + '... | ' + data.agent;
  connectStream(sessionId);
  loadSessions();
  setReady();
  enableInput(true);
  isStreaming = false;
  updateUI();
}

async function sendCommand(cmd) {
  await ensureSession();
  inputEl.value = '';
  const div = document.createElement('div');
  div.className = 'msg user';
  div.textContent = cmd;
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
  enableInput(false);
  isStreaming = true;
  setStatus('Running ' + cmd + '...');
  try {
    const res = await fetch('/api/session/' + sessionId + '/message', {
      method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({text: cmd})
    });
    if (!res.ok) throw new Error(res.status + ': ' + await res.text());
    loadSessions();
  } catch(e) {
    const errDiv = document.createElement('div');
    errDiv.className = 'msg error';
    errDiv.textContent = 'Command failed: ' + e.message;
    messagesEl.appendChild(errDiv);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    setReady('Error');
    enableInput(true);
    isStreaming = false;
  }
}

undoBtn.addEventListener('click', () => sendCommand('/undo'));
redoBtn.addEventListener('click', () => sendCommand('/redo'));
initBtn.addEventListener('click', () => sendCommand('/init'));
shareBtn.addEventListener('click', () => sendCommand('/share'));
forkBtn.addEventListener('click', forkSession);
settingsBtn.addEventListener('click', () => {
  settingsPanel.style.display = settingsPanel.style.display === 'none' ? 'block' : 'none';
});
refsBtn.addEventListener('click', showReferences);
closeRefsBtn.addEventListener('click', () => { refsModal.style.display = 'none'; });
clearSessionBtn.addEventListener('click', () => {
  if (confirm('Clear all messages?')) sendCommand('/new');
  settingsPanel.style.display = 'none';
});

function renderMarkdown(text) {
  if (!text) return '';
  const escaped = text
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  let html = escaped;
  html = html.replace(/```(\w*)\n([\s\S]*?)```/g, (_, lang, code) => {
    const copyId = 'copy-' + Math.random().toString(36).slice(2, 7);
    return '<pre><button class="copy-btn" data-copy-id="' + copyId + '">Copy</button><code id="' + copyId + '">' + code.trim() + '</code></pre>';
  });
  html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
  html = html.replace(/#### (.+)/g, '<h4>$1</h4>');
  html = html.replace(/### (.+)/g, '<h3>$1</h3>');
  html = html.replace(/## (.+)/g, '<h2>$1</h2>');
  html = html.replace(/# (.+)/g, '<h1>$1</h1>');
  html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');
  html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>');
  html = html.replace(/^---$/gm, '<hr>');
  html = html.replace(/\|(.+)\|\n\|[-| ]+\|\n((?:\|.+\|\n?)*)/g, (match, header, body) => {
    const headers = header.split('|').filter(h => h.trim()).map(h => '<th>' + h.trim() + '</th>').join('');
    const rows = body.trim().split('\n').map(row => {
      const cells = row.split('|').filter(c => c.trim()).map(c => '<td>' + c.trim() + '</td>').join('');
      return '<tr>' + cells + '</tr>';
    }).join('');
    return '<table><thead><tr>' + headers + '</tr></thead><tbody>' + rows + '</tbody></table>';
  });
  html = html.replace(/^- (.+)/gm, '<li>$1</li>');
  html = html.replace(/^&gt; (.+)/gm, '<blockquote>$1</blockquote>');
  const hasBlock = /<(?:h[1-4]|pre|table|ul|ol|li|blockquote|hr)/.test(html);
  if (!hasBlock) {
    html = html.replace(/\n\n/g, '</p><p>');
    html = '<p>' + html + '</p>';
  }
  return html;
}

document.addEventListener('click', e => {
  const btn = e.target.closest('.copy-btn');
  if (!btn) return;
  const id = btn.dataset.copyId;
  const el = document.getElementById(id);
  if (!el) return;
  navigator.clipboard.writeText(el.textContent).then(() => {
    btn.textContent = 'Copied!';
    setTimeout(() => btn.textContent = 'Copy', 2000);
  }).catch(() => {});
});

function onToken(data) {
  let parsed;
  try { parsed = JSON.parse(data); } catch(e) { return; }
  if (!parsed.delta) return;
  if (!currentAssistantDiv) {
    currentAssistantDiv = document.createElement('div');
    currentAssistantDiv.className = 'msg assistant';
    messagesEl.appendChild(currentAssistantDiv);
  }
  currentAssistantText += parsed.delta;
  currentAssistantDiv.innerHTML = renderMarkdown(currentAssistantText);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function onToolCall(data) {
  finalizeAssistant();
  let parsed;
  try { parsed = JSON.parse(data); } catch(e) { parsed = {tool: '?', args: '{}'}; }
  const div = document.createElement('div');
  div.className = 'msg tool_call';
  div.textContent = 'Tool: ' + parsed.tool + ' | Args: ' + (typeof parsed.args === 'string' ? parsed.args : JSON.stringify(parsed.args, null, 2));
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function showShareLink(shareId) {
  const shareUrl = window.location.origin + '/api/shared/' + shareId;
  const badge = document.getElementById('shareBadge');
  badge.textContent = 'Shared: /api/shared/' + shareId;
  badge.style.display = 'block';
  const div = document.createElement('div');
  div.className = 'msg tool_result';
  div.innerHTML = 'Session shared! <a href="' + shareUrl + '" target="_blank">' + shareUrl + '</a>';
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
  navigator.clipboard.writeText(shareUrl).catch(() => {});
}

function onDone(data) {
  finalizeAssistant();
  let parsed;
  try { parsed = JSON.parse(data); } catch(e) { parsed = {steps: 0}; }
  isStreaming = false;
  enableInput(true);
  if (parsed.type === 'share') {
    showShareLink(parsed.id);
    setReady('Session shared');
  } else {
    setReady('Done (' + (parsed.steps || 0) + ' steps)');
  }
  loadUsage();
  loadSessions();
}

function onError(data) {
  finalizeAssistant();
  let parsed;
  try { parsed = JSON.parse(data); } catch(e) { parsed = {message: data}; }
  const div = document.createElement('div');
  div.className = 'msg error';
  div.textContent = 'Error: ' + (parsed.message || data);
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
  isStreaming = false;
  enableInput(true);
  setReady('Error');
}

function finalizeAssistant() {
  currentAssistantDiv = null;
  currentAssistantText = '';
}

function addEvent(type, data) {
  let parsed;
  try { parsed = JSON.parse(data); } catch(e) { parsed = data; }
  const div = document.createElement('div');
  if (type === 'compaction') {
    div.className = 'msg tool_result';
    div.textContent = '[Compacted] ' + (parsed.summary || '');
  } else if (type === 'ask_permission') {
    div.className = 'msg tool_call';
    div.textContent = 'Permission needed: ' + (parsed.tool || '') + ' on ' + (parsed.resource || '');
  } else if (type === 'tool_result') {
    div.className = 'msg tool_result';
    div.textContent = 'Result: ' + (parsed.output || JSON.stringify(parsed));
  } else if (type === 'plan') {
    div.className = 'msg plan';
    div.innerHTML = renderMarkdown(parsed.text || data);
  } else if (type === 'compaction_error') {
    div.className = 'msg error';
    div.textContent = 'Compaction error: ' + (parsed.error || '');
  }
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

async function sendMessage() {
  const text = inputEl.value.trim();
  if (!text || !sessionId) return;
  inputEl.value = '';
  enableInput(false);
  setStatus('Waiting...');
  isStreaming = true;

  const div = document.createElement('div');
  div.className = 'msg user';
  div.innerHTML = renderMarkdown(text);
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;

  try {
    const res = await fetch('/api/session/' + sessionId + '/message', {
      method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({text})
    });
    if (!res.ok) throw new Error(res.status + ': ' + await res.text());
  } catch(e) {
    const errDiv = document.createElement('div');
    errDiv.className = 'msg error';
    errDiv.textContent = 'Send failed: ' + e.message;
    messagesEl.appendChild(errDiv);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    setReady('Error');
    enableInput(true);
    isStreaming = false;
  }
}

// File search autocomplete
async function searchFiles(query) {
  const atIdx = query.lastIndexOf('@');
  if (atIdx < 0) { autoComplete.style.display = 'none'; return; }
  const term = query.substring(atIdx + 1);
  if (!term || term.includes(' ')) { autoComplete.style.display = 'none'; return; }
  try {
    const res = await fetch('/api/search/files?query=' + encodeURIComponent(term) + '&max=8');
    const files = await res.json();
    autoComplete.innerHTML = files.map((f, i) =>
      '<div data-idx="' + i + '" data-path="' + f.path + '" class="' + (i === selectedAcIndex ? 'selected' : '') + '">' + f.name + ' <span class="ac-path">' + f.directory + '</span></div>'
    ).join('');
    autoComplete.style.display = files.length ? 'block' : 'none';
    autoComplete.querySelectorAll('div').forEach(el => {
      el.addEventListener('click', () => insertFileRef(atIdx, el.dataset.path));
    });
  } catch(e) { autoComplete.style.display = 'none'; }
}

function insertFileRef(atIdx, path) {
  const val = inputEl.value;
  inputEl.value = val.substring(0, atIdx) + '@' + path + ' ';
  autoComplete.style.display = 'none';
  inputEl.focus();
}

async function forkSession() {
  if (!sessionId) return;
  try {
    var resp = await fetch('/api/session/' + sessionId + '/fork', { method: 'POST' });
    var data = await resp.json();
    if (data.id) {
      sessionId = data.id;
      loadSessions();
      loadMessages();
      setStatus('Forked to new session');
    }
  } catch(e) { console.error('Fork failed', e); }
}

async function showReferences() {
  try {
    var resp = await fetch('/api/references/resolve-all');
    var text = await resp.text();
    refsContent.textContent = text || 'No references configured. Add references to opencode.json.';
    refsModal.style.display = 'flex';
  } catch(e) {
    refsContent.textContent = 'Failed to load references: ' + e.message;
    refsModal.style.display = 'flex';
  }
}

function enableInput(enabled) {
  sendBtn.disabled = !enabled;
  inputEl.disabled = !enabled;
  if (enabled) { inputEl.focus(); }
}

function setStatus(msg) { statusEl.textContent = msg + (msg && !msg.includes('...') && !msg.includes('Ready') ? '...' : ''); }
function setReady(msg) { statusEl.textContent = msg || 'Ready'; }

function updateUI() {
  forkBtn.disabled = !sessionId;
}

inputEl.addEventListener('input', () => {
  sendBtn.disabled = !inputEl.value.trim() || !sessionId || isStreaming;
  selectedAcIndex = -1;
  clearTimeout(fileSearchTimeout);
  fileSearchTimeout = setTimeout(() => searchFiles(inputEl.value), 150);
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 200) + 'px';
});

inputEl.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  if (e.key === 'Escape') { autoComplete.style.display = 'none'; }
  if (autoComplete.style.display !== 'none') {
    const items = autoComplete.querySelectorAll('div');
    if (e.key === 'ArrowDown') { e.preventDefault(); selectedAcIndex = Math.min(selectedAcIndex + 1, items.length - 1); highlightAc(); }
    if (e.key === 'ArrowUp') { e.preventDefault(); selectedAcIndex = Math.max(selectedAcIndex - 1, 0); highlightAc(); }
    if (e.key === 'Tab' || e.key === 'Enter') {
      if (selectedAcIndex >= 0 && items[selectedAcIndex]) {
        e.preventDefault();
        const atIdx = inputEl.value.lastIndexOf('@');
        if (atIdx >= 0) insertFileRef(atIdx, items[selectedAcIndex].dataset.path);
      }
    }
  }
});

function highlightAc() {
  autoComplete.querySelectorAll('div').forEach((el, i) => el.classList.toggle('selected', i === selectedAcIndex));
}

newSessionBtn.addEventListener('click', newSession);

loadProviders();
loadSessions();
newSession();
</script>
